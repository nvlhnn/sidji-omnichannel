
services:
  # ============================================
  # Go Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: sidji-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.production
    environment:
      - APP_ENV=production
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - sidji-network

  # ============================================
  # Next.js Frontend
  # ============================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.sidji.nvlhnn.dpdns.org/api
        NEXT_PUBLIC_WS_URL: wss://api.sidji.nvlhnn.dpdns.org/api/ws
        NEXT_PUBLIC_META_APP_ID: ${META_APP_ID}
    container_name: sidji-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - sidji-network

  # ============================================
  # Nginx Reverse Proxy + SSL
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: sidji-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - sidji-network

  # ============================================
  # Certbot for SSL Certificate
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: sidji-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - sidji-network

networks:
  sidji-network:
    driver: bridge
