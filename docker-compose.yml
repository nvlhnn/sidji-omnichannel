version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg15
    container_name: sidji-omnichannel-postgres
    environment:
      POSTGRES_USER: sidji
      POSTGRES_PASSWORD: sidji123
      POSTGRES_DB: sidji
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidji"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and real-time pub/sub
  redis:
    image: redis:7-alpine
    container_name: sidji-omnichannel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sidji-omnichannel-api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    # For hot reload during development
    command: go run cmd/server/main.go

volumes:
  postgres_data:
  redis_data:
